 <html lang = "en">
  <head>
      <link rel="stylesheet" href="stylesheet.css"> <<!-- link to stylesheet-->
	  <!--displays the title in browser tab-->
      <title>NewLife Medical Clinic Patient Registration Form</title>
  </head>
  <body>
      <header>
        <table width="100%">
        <tr>
            <td valign="top" align="left" width="20%">
                <div class="image">
                    <img align="center" src="download.png" alt="New Life Medical Clinic Logo" width="200px" id="logo"/>
                </div>
            </td>  

            <td>
                <h2>NewLife Medical Clinic</h2>
            </td>

            <td valign="bottom" align="right" width="20%">
                <p>Today's Date: <span id="today"></span></p>
            </td>
        </tr>
        </table>
    </header>
<!-- form starts here-->
<form name ="signup" id="signup" action="thankyou.html">
   <center>
      <div class="format">
        <table>
          <tr>
            <th colspan="4">Create Patient Account</th>
          </tr>
          <tr>
             <td class="td1"><label for="firstname">First Name</label></td>
             <td>
                <input 
                 type="text"
                 name="firstname"
                 id="firstname"
                 maxlength="30"
                 required
                 title="Enter letters, apostrophes, or hyphens."
				 pattern="[a-zA-Z']{1,30}"
				 onblur="validateFirstName()"
                 placeholder="Jane"
                 />
				 
		     </br>
			 <span class="error" id="firstName-error"></span>
             </td>
          </tr>
			
          <tr>
             <td class="td1"><label for="middleinit">MI</label></td>
             <td>
                <input 
                 type="text"
                 name="middleinit"
                 id="middleinit"
                 maxlength="1"
                 required
                 title="Enter letters."
				 pattern="[a-zA-Z']{0,1}"
				 onblur="validateMiddleInit()"
                 placeholder="X"
                 />

			 </br>
			 <span class="error" id="middleInit-error"></span>
             </td>
          </tr>
			
          <tr>
             <td class="td1"><label for="lastname">Last Name</label></td>
             <td>
                <input 
                 type="text"
                 name="lastname"
                 id="lastname"
                 maxlength="30"
                 required
                 title="Enter letters, apostrophes, or hyphens."
				 pattern="[a-zA-Z']{1,30}"
				 onblur="validateLastName()"
                 placeholder="Doe"
                 />
			 </br>
			 <span class="error" id="lastName-error"></span>
             </td>
          </tr>
			
          <tr>
             <td class="td1"><label for="dob">Date of Birth:</label></td>
             <td>
                <input
                 type="date"
                 id="dob"
                 name="dob"
				 onblur="validateDOB()"
				 required
                 />
			 </br>
			 <span class="error" id="dob-error"></span>
             </td>
          </tr>
			
          <tr>
             <td class="td1"><label for="ssn">Social Security Number:</label></td>
             <td>
                <input
                 type="password"
                 minlength="9"
                 maxlength="11"
                 name="ssn"
                 id="ssn"
                 required
                 title="Numbers only."
                 placeholder="123-45-6789"
				 onblur="validateSSN()"
                 />
			 </br>
			 <span class="error" id="ssn-error"></span>
             </td>
          </tr>
          <tr>
             <td class="td1"><label for="address1">Address Line 1</label></td>
             <td>
                <input
                 type="text"
                 name="address1"
                 id="address1"
                 maxlength="40"
                 required
                 title="Patient Address"
                 placeholder="123 Main St."
				 onblur="validateAddress1()"
                 />
			 </br>
			 <span class="error" id="address1-error"></span>
             </td>
          </tr>
           <tr>
             <td class="td1"><label for="address2">Address Line 2</label></td>
             <td>
                <input
                 type="text"
                 name="address2"
                 id="address2"
                 maxlength="40"
                 title="Patient Address"
                 placeholder="123 Main St."
                 />
             </td>
          </tr>
          <tr>
             <td class="td1"><label for="city">City</label></td>
             <td>
                <input
                 type="text"
                 name="city"
                 id="city"
                 maxlength="30"
				 required
                 title="Patient City"
                 placeholder="Houston"
                 />
             </td>
          </tr>

          <tr>
             <td class="td1"><label for="state">State</label></td>
             <td>
                <select>
                  <option selected disabled>Select a State</option>
	                <option value="AL">Alabama</option>
	                <option value="AK">Alaska</option>
                 	<option value="AZ">Arizona</option>
                 	<option value="AR">Arkansas</option>
                 	<option value="CA">California</option>
                 	<option value="CO">Colorado</option>
                 	<option value="CT">Connecticut</option>
                 	<option value="DE">Delaware</option>
                 	<option value="DC">District Of Columbia</option>
                 	<option value="FL">Florida</option>
                 	<option value="GA">Georgia</option>
                 	<option value="HI">Hawaii</option>
                 	<option value="ID">Idaho</option>
                 	<option value="IL">Illinois</option>
                 	<option value="IN">Indiana</option>
                 	<option value="IA">Iowa</option>
                 	<option value="KS">Kansas</option>
                 	<option value="KY">Kentucky</option>
                 	<option value="LA">Louisiana</option>
                 	<option value="ME">Maine</option>
                 	<option value="MD">Maryland</option>
                 	<option value="MA">Massachusetts</option>
                 	<option value="MI">Michigan</option>
                 	<option value="MN">Minnesota</option>
                 	<option value="MS">Mississippi</option>
                 	<option value="MO">Missouri</option>
                 	<option value="MT">Montana</option>
                 	<option value="NE">Nebraska</option>
                 	<option value="NV">Nevada</option>
                 	<option value="NH">New Hampshire</option>
                 	<option value="NJ">New Jersey</option>
                 	<option value="NM">New Mexico</option>
                 	<option value="NY">New York</option>
                 	<option value="NC">North Carolina</option>
                 	<option value="ND">North Dakota</option>
                 	<option value="OH">Ohio</option>
                 	<option value="OK">Oklahoma</option>
                 	<option value="OR">Oregon</option>
                 	<option value="PA">Pennsylvania</option>
                 	<option value="RI">Rhode Island</option>
                 	<option value="SC">South Carolina</option>
                 	<option value="SD">South Dakota</option>
                 	<option value="TN">Tennessee</option>
                 	<option value="TX">Texas</option>
                 	<option value="UT">Utah</option>
                 	<option value="VT">Vermont</option>
                 	<option value="VA">Virginia</option>
                 	<option value="WA">Washington</option>
                 	<option value="WV">West Virginia</option>
                 	<option value="WI">Wisconsin</option>
                 	<option value="WY">Wyoming</option>
                </select>
             </td>
          </tr>
          <tr>
             <td class="td1"><label for="zip">Zip Code</label></td>
             <td>
                <input
                 type="text"
                 name="zip"
                 id="zip"
                 maxlength="5"
				 required
                 title="Enter numbers."
                 placeholder="77023"
				 pattern="[0-9]{5}"
				 onblur="validatezip()"
                 />
			 </br>
			 <span class="error" id="zipcode-error"></span>
             </td>
          </tr>
          <tr>
             <td class="td1"><label for="email">Email Address</label></td>
             <td>
                <input
                 type="text"
                 name="email"
                 id="email"
                 maxlength="50"
		 		 required
                 title="Patient Email Address"
                 placeholder="jane.doe@gmail.com"
				 onblur="validateEmail()"
                 />
			 </br>
			 <span class="error" id="email-error"></span>
             </td>
          </tr>
		  <tr>
             <td class="td1"><label for="phone">Phone Number</label></td>
             <td>
                <input
                 type="text"
                 name="phone"
                 id="phone"
                 maxlength="12"
		 		 required
                 title="Patient Phone Number"
                 placeholder="123-456-7890"
				 pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
				 onblur="validatePhoneNum()"
                 />
			 </br>
			 <span class="error" id="phonenum-error"></span>
             </td>
          </tr>
          <tr>
             <td class="td1"><label for="patientsex">Patient's Sex</label></td>
             <td>
                <input
                 type="radio"
                 id="s1"
                 name="patientsex"
                 value="Male"
                 />
                 Male
             
                <input
                 type="radio"
                 id="s2"
                 name="patientsex"
                 value="Female"
                 />
                 Female
              
                <input
                 type="radio"
                 id="s3"
                 name="patientsex"
                 value="Other"
                 />
                 Other
             </td>
          </tr>
		  <tr>
            <th colspan="4"><hr></th>
          </tr>
           <tr>
             <td class="td1"><label for="q1">Have you seen a doctor <br>in the last 5 years?</label></td>
             <td>
                <input
                 type="radio"
                 id="q1"
                 name="q1"
                 value="Yes"
                 />
                 Yes
                <input
                 type="radio"
                 id="q2"
                 name="q1"
                 value="No"
                 />
                 No
             </td>
          </tr>
		  <tr>
             <td class="td1"><label for="q2">Is there a history of serious<br> illness in your family?</label></td>
             <td>
                <input
                 type="radio"
                 id="q2"
                 name="q2"
                 value="Yes"
                 />
                 Yes
                <input
                 type="radio"
                 id="q2"
                 name="q2"
                 value="No"
                 />
                 No
             </td>
          </tr>
		  <tr>
			  <td class="td1"><label for="patienthist">Check all that apply:</label></td>
			  <td>
				  <input type="checkbox" id="option1" value="HeartDiesease"/>
				  <label for="HeartDisease">Heart Disease</label><br>

				  <input type="checkbox" id="option2" value="Cancer"/>
				  <label for="Cancer">Cancer</label><br>

				  <input type="checkbox" id="option3" value="Diabetes"/>
				  <label for="Diabetes">Diabetes</label><br>

				  <input type="checkbox" id="option4" value="Alzheimers"/>
				  <label for="Alzheimers">Alzheimers</label><br>

				  <input type="checkbox" id="option5" value="NA"/>
				  <label for="NA">None of The Above</label><br>
			  </td>
		  </tr>

		  <tr>
			  <td class="td1" align="left">
			  	<label for="notes">Are there any concerns <br>about your health?</label>
			  </td>
			  <td>
				<textarea
				rows="4"
				cols="50"
				maxlength="500"
				id="notes"
				name="notes"
				title="Enter any concerns"
				placeholder="Type Here"
				></textarea>
				<span id="description_text"></span>
			  </td>
		  </tr>
          <tr>
            <th colspan="4"><hr></th>
          </tr>
		  <tr>
 		 	 <td class="td1"><label for="UID">User ID</label></td>
             <td>
                <input 
                 type="text"
                 name="UID"
                 id="UID"
				 minlength="4"
                 maxlength="20"
                 required
                 title="Username must have at least 4 characters."
                 placeholder="Jane820"
				 onblur="validateUID()"
                 />
		  	 </br>
			 <span class="error" id="uid-error"></span>
             </td>
		  </tr>
		  <tr>
 		 	 <td class="td1"><label for="pass">Password</label></td>
             <td>
                <input 
                 type="password"
                 name="pass"
                 id="pass"
                 maxlength="30"
                 required
                 title="Must have at least 10 characters, one number, one special character, one lowercase letter, and one uppercase letter."
                 placeholder="Req'd"
				 onblur="validatepass()"
				 oninput="validatepass()"
				 onfocus="validatepass()"
                 />
			 </br>
			 <span class="error" id="pass-error"></span>
             </td>
		  </tr>
		   <tr>
 		 	 <td class="td1"><label for="confirm">Confirm Password</label></td>
             <td>
                <input 
                 type="password"
                 name="confirm"
                 id="confirm"
                 maxlength="30"
                 required
                 title="Confirm Patient Password."
                 placeholder="Req'd"
				 onblur="confirmpass()"
				 oninput="confirmpass()"
				 onfocus="confirmpass()"
                 />
			 </br>
			 <span class="error" id="password2-error"></span>
             </td>
		  </tr>
		  <tr>
			  <td class="td1"><label for="range">On a scale of 1 to 10 how likely <br>are you to recommend NewLife Medical?</label></td>
			  <td>
				  <input
				  type="range"
				  name="range"
				  id="range"
				  min="1"
				  max="10"
				  value="0"
				  />
				  <span id="rangeslider"></span>
			  </td>
		  </tr>
	 	  <tr>
            <th colspan="4"><hr></th>
          </tr>
		  <tr>
            <td class="td1" colspan="4">
				<center>
					<input type="submit" name="submit" id="submit">
					&nbsp;&nbsp;&nbsp;&nbsp;
					<input type="reset" name="reset" id="reset">
					&nbsp;&nbsp;&nbsp;&nbsp;
					<input type="button" name="review" id="review" value="Review" onclick="showInput()">
					&nbsp;&nbsp;&nbsp;&nbsp;
					<input type="button" name="validate" id="validate" value="validate" onclick="validateForm()">
				</center>
          </tr>
        </table>
      </div>
   <div class="password-message">
	   <span id="msg1"></span><br/> 
	   <span id="msg2"></span><br/>
	   <span id="msg3"></span><br/>
	   <span id="msg4"></span><br/>
	   <span id="msg5"></span><br/>
	   <span id="msg6"></span><br/>
	   <span id="msg7"></span><br/>
	   <span id="password2-error"></span><br/>
   </div>
	   <center>
		   <p id="showInput"></p>
	   </center>
   </center>
</form> 
<!--footer starts here-->
<footer>

</footer>
<script src="dynamic-date.js"></script>
<div id="alert-box">
   <div id="alert-content">
	   	<h4>Please fill all of the information</h4>
	   	<button id="close-alert">Ok</button>
   </div>
</div>
   </body>
</html>
